name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  harness:
    name: Harness Checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint harness/root Python surface
        run: python -m ruff check harness conftest.py

      - name: Format check harness/root Python surface
        run: python -m ruff format --check harness conftest.py

      - name: Run harness tests
        run: python -m pytest harness/tests/ -v

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  engram-validate:
    name: Engram Validate & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: engram

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        working-directory: .
        run: python -m pip install -e ".[dev]"

      - name: Check initial commit manifest freshness
        run: python HUMANS/tooling/scripts/generate_initial_commit_manifest.py --check

      - name: Resolve capability manifest against runtime
        run: python HUMANS/tooling/scripts/resolve_memory_capabilities.py .

      - name: Run contract smoke tests
        run: >-
          python -m pytest
          HUMANS/tooling/tests/test_memory_capabilities.py
          core/tools/tests/test_surface_unlinked.py
          -v

      # We run the hook commands directly instead of `pre-commit run` because
      # pre-commit anchors paths at the git toplevel — which in the merged
      # engram-harness layout is the parent repo, not engram/.
      - name: Lint engram modules (ruff check)
        run: python -m ruff check HUMANS/tooling/scripts/ HUMANS/tooling/tests/ core/tools/

      - name: Format check engram modules (ruff format)
        run: python -m ruff format --check HUMANS/tooling/scripts/ HUMANS/tooling/tests/ core/tools/

      - name: Validate memory repo
        run: python HUMANS/tooling/scripts/validate_memory_repo.py

      # Live-repo tests that assume engram is the git root are auto-skipped
      # by engram/conftest.py when invoked from the merged engram-harness layout.
      - name: Run tests
        run: python -m pytest HUMANS/tooling/tests/ core/tools/tests/ -v

      - name: Lint shell scripts
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y shellcheck
          shellcheck setup.sh HUMANS/setup/setup.sh HUMANS/tooling/scripts/onboard-export.sh

  search-extras:
    name: Test with search extras
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engram

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with search extras
        working-directory: .
        run: python -m pip install -e ".[dev,search]"

      # TestSearchFreshnessWeight is auto-skipped by engram/conftest.py when
      # engram is not the git root.
      - name: Run search tests
        run: >-
          python -m pytest
          core/tools/tests/test_semantic_search.py
          core/tools/tests/test_search_freshness.py
          -v
