name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  harness:
    name: Harness Checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint harness/root Python surface
        run: python -m ruff check harness conftest.py

      - name: Format check harness/root Python surface
        run: python -m ruff format --check harness conftest.py

      - name: Run harness tests
        run: python -m pytest harness/tests/ -v

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  harness-search-extras:
    name: Harness with search extras
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with search extras
        run: python -m pip install -e ".[dev,search]"

      - name: Run harness tests with semantic deps available
        run: python -m pytest harness/tests/ -v
