name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  harness:
    name: Harness Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint new harness modules
        run: >-
          python -m ruff check
          harness/engram_memory.py
          harness/trace_bridge.py
          harness/tools/recall.py
          harness/tests/test_engram_memory.py
          harness/tests/test_recall_tool.py
          harness/tests/test_trace_bridge.py

      - name: Run harness tests
        run: python -m pytest harness/tests/ -v

  engram-validate:
    name: Engram Validate & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: engram

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        working-directory: .
        run: python -m pip install -e ".[dev]"

      - name: Check initial commit manifest freshness
        run: python HUMANS/tooling/scripts/generate_initial_commit_manifest.py --check

      - name: Resolve capability manifest against runtime
        run: python HUMANS/tooling/scripts/resolve_memory_capabilities.py .

      - name: Run contract smoke tests
        run: >-
          python -m pytest
          HUMANS/tooling/tests/test_memory_capabilities.py
          core/tools/tests/test_surface_unlinked.py
          -v

      - name: Run pre-commit gate
        run: python -m pre_commit run --all-files

      - name: Run tests
        run: python -m pytest HUMANS/tooling/tests/ core/tools/tests/ -v

      - name: Lint shell scripts
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y shellcheck
          shellcheck setup.sh HUMANS/setup/setup.sh HUMANS/tooling/scripts/onboard-export.sh

  search-extras:
    name: Test with search extras
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engram

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with search extras
        working-directory: .
        run: python -m pip install -e ".[dev,search]"

      - name: Run search tests
        run: >-
          python -m pytest
          core/tools/tests/test_semantic_search.py
          core/tools/tests/test_search_freshness.py
          -v

  worktree-e2e:
    name: Worktree Init E2E
    runs-on: windows-latest
    defaults:
      run:
        working-directory: engram

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        working-directory: .
        run: python -m pip install -e ".[dev]"

      - name: Run worktree init end-to-end test
        run: >-
          python -m pytest
          HUMANS/tooling/tests/test_setup_flows.py::SetupFlowTests::test_init_worktree_creates_orphan_branch_with_committed_memory_worktree
          -v
