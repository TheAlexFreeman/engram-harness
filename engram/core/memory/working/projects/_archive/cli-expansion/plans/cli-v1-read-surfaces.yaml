purpose:
  summary: Add contextual recall and ACCESS log read surfaces to the engram CLI.
  context: >
    v0 proved the engram CLI scaffold with search, status, and validate. The
    next read-only surfaces should make terminal inspection richer without
    introducing write risk:

    - engram recall <path-or-query> for frontmatter-aware file and namespace
      inspection
    - engram log for recent ACCESS activity with namespace and time filters

    This plan should extract shared formatting and lookup helpers instead of
    duplicating rendering logic across commands.
  questions: []
