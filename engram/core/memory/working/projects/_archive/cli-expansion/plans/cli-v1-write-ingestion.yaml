purpose:
  summary: Add governed write and ingestion flows to the engram CLI.
  context: >
    The first write surface in the CLI roadmap is engram add. It should accept
    Markdown from a file or stdin, route external content into the correct
    namespace or _unverified holding area, generate frontmatter and provenance,
    and preserve the same governance rules as the MCP write tools.

    This plan stays focused on ingestion. Lifecycle commands such as promote and
    archive are handled separately in v2 after review and aggregate previews
    exist.
  questions: []
