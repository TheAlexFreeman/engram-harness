purpose:
  summary: 'Implement the first three engram CLI commands: search, status, and validate.'
  context: >
    Engram had no human- or agent-facing CLI for interacting with memory outside
    the MCP protocol. The three highest-leverage commands were search (query
    memory from a terminal), status (memory health dashboard), and validate
    (repo integrity check). All three reuse existing business logic; the CLI is
    a thin presentation layer on top of functions already implemented in the MCP
    server and validator script. Design constraints were argparse (matching the
    existing CLIs), --json on every command, graceful degradation when optional
    dependencies are missing, and the same repo-root resolution chain as the MCP
    server.
  questions: []
