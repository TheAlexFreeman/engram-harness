purpose:
  summary: Add plan list/show/create/advance commands to the engram CLI.
  context: >
    The Active Plans system already exists through MCP tools, but shell-native
    agents and humans still need a terminal surface for inspecting plans,
    authoring new ones, and advancing execution without a browser or chat-hosted
    MCP integration.

    This plan covers four plan-related subcommands:
    - engram plan list
    - engram plan show <plan-id>
    - engram plan create
    - engram plan advance

    It depends on the schema-foundation work so that create/help flows can reuse
    discoverable nested schemas instead of duplicating fragile hand-written help.
  questions: []
