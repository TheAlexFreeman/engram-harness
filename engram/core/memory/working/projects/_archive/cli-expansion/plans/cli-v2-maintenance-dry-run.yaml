purpose:
  summary: Add review and aggregate dry-run maintenance surfaces to the engram CLI.
  context: >
    Before lifecycle commands can safely mutate review queues and archive state,
    the CLI needs high-quality preview surfaces for maintenance work. This plan
    covers the dry-run half of v2:

    - engram review in shell-friendly, no-TUI form first
    - engram aggregate --dry-run style preview and reporting

    Optional TUI work is explicitly out of scope until the shell flow exists and
    proves insufficient.
  questions: []
work:
