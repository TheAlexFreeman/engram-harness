      title: Enumerate review, stale-content, and aggregation candidates
      status: completed
      commit: null
      blockers:
        - cli-v1-read-surfaces:log-command
        - cli-v1-write-ingestion:write-surface-verification
      sources:
        - path: core/governance/review-queue.md
          type: internal
          intent: Reuse the review queue as the primary maintenance input.
        - path: core/tools/agent_memory_mcp/tools/read_tools/_health.py
          type: internal
          intent: Reuse stale-content and aggregation heuristics already used by read tools.
        - path: core/memory/working/projects/cli-expansion/notes/cli-roadmap.md
          type: internal
          intent: Keep dry-run scope aligned with the roadmap's maintenance commands.
      postconditions:
        - description: Candidate enumeration covers review queue items, stale content, and ACCESS aggregation opportunities.
        - description: Candidate output has a stable JSON schema that later lifecycle commands can consume.
      changes:
        - path: core/tools/agent_memory_mcp/cli/cmd_review.py
          action: create
          description: Shared candidate enumeration helpers for review and aggregate flows.
        - path: core/tools/agent_memory_mcp/cli/cmd_aggregate.py
