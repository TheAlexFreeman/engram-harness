        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          type: internal
          intent: Update the highest-impact plan and approval tool docstrings where callers need them.
      postconditions:
        - description: Complex MCP tools document enum values, conditional fields, and nested object shape in their docstrings.
        - description: Tool descriptions are good enough to power CLI help text for schema-heavy commands.
      changes:
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
