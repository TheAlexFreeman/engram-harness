purpose:
  summary: Improve MCP schema discoverability and validation ergonomics that unblock plan-oriented CLI commands.
  context: >
    The CLI roadmap's v3 plan and approval commands depend on complex, schema-
    heavy MCP tools. Existing notes identified three cross-cutting gaps that
    make both agent callers and terminal authorship clumsy:

    - nested schema details are missing from several tool descriptions
    - validation for nested inputs is still mostly fail-fast
    - the schema introspection surface is not yet treated as the canonical
      contract that the CLI can reuse for help and guided authoring

    This plan addresses those prerequisites before the plan/approval/trace CLI
    commands are attempted.
  questions: []
work:
