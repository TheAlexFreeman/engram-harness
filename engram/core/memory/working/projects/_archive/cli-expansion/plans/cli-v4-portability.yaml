          type: internal
          intent: Keep export/import formats aligned with the roadmap promise.
        - path: HUMANS/tooling/onboard-export-template.md
          type: internal
          intent: Reuse existing thinking about what portable onboarding artifacts should include.
        - path: README.md
          type: internal
          intent: Keep portability expectations consistent with repository layout and installation assumptions.
      postconditions:
        - description: Export bundle formats and minimum preserved artifacts are documented for md, json, and tar modes.
        - description: Import validation rules specify what can be restored into a target instance.
      changes:
        - path: core/tools/agent_memory_mcp/cli/cmd_export.py
          action: create
