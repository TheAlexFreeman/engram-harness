purpose:
  summary: Add export and import portability commands to the engram CLI.
  context: >
    The final roadmap stage turns the CLI into a portability layer for backup,
    migration, and instance seeding. Export/import needs stable command
    contracts from earlier plan, approval, and trace work so that bundles can
    preserve the right artifacts without reverse-engineering ad hoc state.
  questions: []
work:
