          description: Directory for pending merge conflict records with metadata about conflicting files and users.
        - path: core/tools/agent_memory_mcp/tools/write_tools.py
          action: update
          description: Add memory_resolve_merge tool for reviewing and resolving queued conflicts.
      postconditions:
