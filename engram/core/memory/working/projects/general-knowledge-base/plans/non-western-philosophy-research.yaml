id: non-western-philosophy-research
project: general-knowledge-base
created: '2026-03-26'
origin_session: memory/activity/2026/03/26/chat-003
status: active
sessions_used: 4
budget:
  deadline: '2026-06-30'
  max_sessions: 5
  advisory: true
purpose:
  summary: >-
    Build a dedicated non-western/ subdomain under philosophy/ with depth
    coverage of Indian and Chinese philosophical traditions, replacing
    the three survey-level history/ files that currently represent the
    entire non-Western philosophical corpus.
  context: |
    The philosophy/ domain has 86 files and excellent coverage of Western
    analytic and continental traditions, but non-Western philosophy is
    represented by only three survey-level files under philosophy/history/
    non-western/ (chinese-philosophy.md, indian-philosophy.md, islamic-
    modern-philosophy.md). These are orientation files, not substantive
    coverage.

    This is a meaningful gap for two reasons. First, intellectual honesty:
    Indian and Chinese philosophical traditions predate the Western canon in
    many areas and have well-developed epistemologies, logics, and
    philosophies of mind that are independently interesting. Second, AI
    relevance: Buddhist epistemology (Dignāga on perception and inference),
    Advaita non-dualism (consciousness as fundamental), Daoist process
    metaphysics (wu-wei as non-forced action), and Wang Yangming's unity-of-
    knowledge-and-action all have direct implications for how to think about
    machine cognition, identity, and the mind-body relationship.

    This plan creates core/memory/knowledge/philosophy/non-western/ with
    8–10 files. The existing survey files will be cross-referenced as
    orientation, not replaced.
  questions:
    - Should the Buddhist logic files focus on classical Indian logic
      (Dignāga/Dharmakīrti) or on Zen/Chan epistemology, or both?
    - How should non-Western views on personal identity connect to the existing
      philosophy/personal-identity/ domain? (Anattā directly disputes the
      Western substance view.)
    - Is there a principled cross-tradition synthesis, or does the synthesis
      have to be modestly comparative rather than integrative?
    - Should Islamic philosophy get its own set of depth files, or does it
      fit better as a continuation of the existing history/ treatment?
work:
  phases:
    - id: orientation
      title: Orient to existing non-Western coverage and define non-western/ scope
      status: completed
      blockers: []
      sources:
        - path: core/memory/knowledge/philosophy/history/non-western/chinese-philosophy.md
          type: internal
          intent: >-
            Establish what is already covered at survey level — the depth files
            should extend beyond this material, not repeat it.
        - path: core/memory/knowledge/philosophy/history/non-western/indian-philosophy.md
          type: internal
          intent: >-
            Same as above for Indian philosophy — survey the existing survey
            to identify where depth is most needed.
        - path: core/memory/knowledge/philosophy/history/non-western/islamic-modern-philosophy.md
          type: internal
          intent: >-
            Determine whether Islamic philosophy should be extended in this
            plan or deferred — assess whether the existing treatment is
            adequate as a cross-reference.
        - path: core/memory/knowledge/philosophy/personal-identity/parfit-reductionism.md
          type: internal
          intent: >-
            Review how personal identity is framed in the West so that the
            anattā treatment correctly contrasts with rather than talks past
            the Western accounts.
        - path: core/memory/knowledge/philosophy/phenomenology/embedded-enacted-ecological-4e.md
          type: internal
          intent: >-
            Check how embodied cognition is treated — Daoist and Buddhist
            process philosophy has structural similarities to 4E cognition
            that the synthesis should note.
      postconditions:
        - Scope note written to IN/ defining the 8–10 target files and their one-paragraph summaries
        - Decision on Islamic philosophy scope (in or out of this plan) documented
        - Confirmed target subdirectory (philosophy/non-western/)
      requires_approval: false
      changes:
