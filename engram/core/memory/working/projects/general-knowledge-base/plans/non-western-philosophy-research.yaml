        - path: core/memory/knowledge/philosophy/personal-identity/parfit-reductionism.md
          type: internal
          intent: >-
            Ground the cross-tradition personal identity comparison in the most
            developed Western treatment — Parfit's reductionism is structurally
            closest to Buddhist anattā and Daoist process views.
        - path: core/memory/knowledge/philosophy/synthesis-intelligence-as-dynamical-regime.md
          type: internal
          intent: >-
            Connect the cross-tradition synthesis to the central philosophical
            thread of the KB — does Daoist process metaphysics or Advaita
            non-dualism support or complicate the intelligence-as-dynamical-
            regime thesis?
        - path: core/memory/knowledge/philosophy/phenomenology/synthesis-phenomenology-dynamical-systems.md
          type: internal
          intent: >-
            Use the phenomenology synthesis as a Western interlocutor for the
            non-Western synthesis — map where phenomenology and non-Western
            accounts converge and diverge.
      postconditions:
        - comparative-epistemology-east-west.md created (trust medium)
        - non-western-synthesis-ai-implications.md created (trust medium)
        - non-western/ SUMMARY.md created listing all 9 files
        - All 9 files have correct frontmatter; pre-commit hooks pass
        - IN/ scope note archived
      requires_approval: true
      changes:
        - path: core/memory/knowledge/philosophy/non-western/comparative-epistemology-east-west.md
          action: create
          description: >-
            Structured comparison across four axes: (1) Valid sources of
            knowledge — Western pramāṇa equivalents (empiricism vs rationalism)
            vs. Nyāya / Buddhist / Daoist epistemic pluralism; (2) The status
            of perception — direct realism, indirect realism, constructionism,
            and the Dharmakīrti svasaṃvedana (self-awareness); (3) Testimony
            and tradition — Brahmanical śabda vs. post-Enlightenment empiricism;
            (4) The limits of knowledge — Jain anekāntavāda, Buddhist apoha,
            Pyrrhonian scepticism, Kantian noumena, Zhuangzi's dissolution
            of the question. What each tradition does and does not attempt to
            explain.
        - path: core/memory/knowledge/philosophy/non-western/non-western-synthesis-ai-implications.md
          action: create
          description: >-
            Synthesis: what non-Western philosophy adds to the KB's intellectual
            picture. Key contributions: (1) Advaita non-dualism as an alternative
            to the hard problem of consciousness; (2) Buddhist anattā as a
            challenge to substance-based personal identity (connects to
            philosophy/personal-identity/ domain); (3) Jain anekāntavāda as
            a formal model for epistemic humility and multi-perspective reasoning
            in AI systems; (4) Daoist wu-wei as a model for non-deliberative
            skilled action; (5) Wang Yangming's unity of knowledge-action as
            a challenge to the planner-executor split in agent architectures.
        - path: core/memory/knowledge/philosophy/non-western/SUMMARY.md
          action: create
          description: >-
            Domain summary listing all 9 files with one-line descriptions,
            recommended reading order (start with comparative-epistemology
            if coming from Western background; start with advaita or daoist
            files if coming from AI angle), and cross-references to
            philosophy/personal-identity/, philosophy/phenomenology/,
            philosophy/history/non-western/ (as prerequisites), and
            philosophy/synthesis-intelligence-as-dynamical-regime.md.
