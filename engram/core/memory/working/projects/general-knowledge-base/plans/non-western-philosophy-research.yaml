            substantially beyond what is summarized there.
        - path: core/memory/knowledge/philosophy/emergence-consciousness-iit.md
          type: internal
          intent: >-
            Connect the Advaita non-dualism file to the Western consciousness
            debate already covered — IIT and Advaita share commitments to
            consciousness as fundamental.
      postconditions:
        - advaita-vedanta-shankara-nonduality.md created (trust medium)
        - buddhist-logic-dignaga-dharmakirti.md created (trust medium)
        - nyaya-vaisheshika-epistemology.md created (trust medium)
        - jain-epistemology-anekantavada.md created (trust medium)
        - Each file has correct YAML frontmatter and related cross-references
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/memory/knowledge/philosophy/non-western/advaita-vedanta-shankara-nonduality.md
          action: create
          description: >-
            Shankara's Advaita Vedanta (8th c.): Brahman as the sole reality;
            ātman-Brahman identity; māyā (illusion) and avidyā (ignorance);
            the three levels of reality (pāramārthika, vyāvahārika, prātibhāsika).
            The two-truths doctrine; superimposition (adhyāsa). Post-Shankara
            developments: Rāmānuja's Viśiṣṭādvaita critique; Madhva's dvaita
            response. Relevance to consciousness debates: non-dualism as
            alternative to the hard problem; comparison with IIT's phi.
        - path: core/memory/knowledge/philosophy/non-western/buddhist-logic-dignaga-dharmakirti.md
          action: create
          description: >-
            Dignāga (5th c.): two valid sources of knowledge (pramāṇa) —
            perception and inference; the apoha theory of meaning (concepts as
            exclusion rather than extension). Dharmakīrti's elaboration:
            the causal theory of perception; svabhāvahetu and kāryahetu
            (identity and causation inferences); the three-aspect criterion
            for valid inference. Buddhist phenomenology: the
            first-moment-perception (nirvikalpaka) vs. conceptual perception
            (savikalpaka). Influence on later Tibetan logic; comparison with
            Nyāya epistemology.
        - path: core/memory/knowledge/philosophy/non-western/nyaya-vaisheshika-epistemology.md
          action: create
          description: >-
            Nyāya school: four pramāṇas (perception, inference, analogy,
            testimony); the syllogism (five-membered anumāna) vs Aristotelian
            syllogism; the theory of inherence (samavāya). Vaiśeṣika ontology:
            seven categories (padārthas) including substance, quality, action,
            generality, particularity, inherence, absence. Udayana's proofs
            for the existence of God. Synthesis with Buddhist epistemology:
            Nyāya realism vs Buddhist anti-realism debate. Connection to
            Western analytic philosophy of language (universal/particular).
        - path: core/memory/knowledge/philosophy/non-western/jain-epistemology-anekantavada.md
          action: create
          description: >-
            Jain doctrine of many-sidedness (anekāntavāda): all complex truths
            have multiple valid aspects; no single perspective is absolutely
            true. Syādvāda (conditional predication): the seven-fold predication
            (saptabhaṅgī) with the qualifier syāt (in some respect). Nayavāda:
            partial standpoints and their legitimate use. Epistemological
            implications: formal fallibilism, perspective-taking, rejection of
            absolute views. Contemporary relevance: anekāntavāda as a model
            for handling semantic ambiguity and conflicting evidence.

    - id: chinese-philosophy-depth
      title: Write depth files on Chinese philosophical traditions
      status: completed
      blockers:
        - indian-philosophy-depth
      sources:
        - path: core/memory/knowledge/philosophy/history/non-western/chinese-philosophy.md
          type: internal
          intent: >-
            Use the survey as a structural baseline — depth files should develop
            the Confucian and Daoist materials substantially beyond the survey.
        - path: core/memory/knowledge/philosophy/ethics/virtue-ethics.md
          type: internal
          intent: >-
            Connect the Confucian moral psychology files to the existing virtue
            ethics coverage — Confucian ren and ritual have structural
            parallels to Aristotelian virtue that should be noted.
        - path: core/memory/knowledge/philosophy/phenomenology/merleau-ponty-perception-as-skill.md
          type: internal
          intent: >-
            Connect Daoist wu-wei and skill-cultivation to Merleau-Ponty's
            skilled body — both resist the deliberative action model that
            dominates Western practical philosophy.
      postconditions:
        - confucian-moral-psychology-mencius-xunzi.md created (trust medium)
        - daoist-metaphysics-zhuangzi-wuwei.md created (trust medium)
        - wang-yangming-unity-knowledge-action.md created (trust medium)
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/memory/knowledge/philosophy/non-western/confucian-moral-psychology-mencius-xunzi.md
          action: create
          description: >-
            Mencius on human nature (xìng): four moral sprouts (compassion,
            shame, modesty, moral approval); the extension (kuò) of moral
            feeling; the Great Mind (dàxīn). Xunzi's contrary view: human
            nature as bad (è xìng), requiring ritual propriety (lǐ) and
            accumulated effort (wěi) for moral cultivation. The Mencius-Xunzi
            debate as a precursor to Western nature-nurture debates. The
            concept of rén (benevolence/humaneness) as the cardinal virtue.
            Ritual propriety (lǐ) as moral practice, not mere convention.
        - path: core/memory/knowledge/philosophy/non-western/daoist-metaphysics-zhuangzi-wuwei.md
          action: create
          description: >-
            The Dào (道): the unnameable ground of being; Laozi's paradoxical
            characterization. Zhuangzi's perspectivism: the story of Cook
            Ding; skill without deliberation as the model of wu-wei. The
            leveling of things (qí wù lùn): rejection of fixed distinctions
            and conventional hierarchies. Zhuangzi's dream butterfly and the
            problem of identity. Neo-Daoist (xuánxué) synthesis with
            Confucianism. Comparison with Heidegger's ready-to-hand and
            Merleau-Ponty's skilled action.
        - path: core/memory/knowledge/philosophy/non-western/wang-yangming-unity-knowledge-action.md
          action: create
          description: >-
            Wang Yangming (1472–1529): the unity of knowledge and action
            (zhī xíng hé yī) — genuine knowing is already a form of doing;
            the critique of mere book learning. Innate moral knowing (liáng zhī):
            conscience as direct access to moral truth; the project of
            "investigating things" located in the mind rather than external
            objects. Contrast with Zhu Xi's Neo-Confucian programme. Wang's
            influence on Japanese Confucianism and bushidō ethics. Contemporary
            relevance: unity of knowledge and action as a model for agent
            reasoning that does not separate deliberation from execution.

    - id: cross-tradition-synthesis
      title: Write cross-tradition synthesis and non-western/ SUMMARY
      status: completed
      blockers:
