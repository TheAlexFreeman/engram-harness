      changes:
        - path: core/memory/knowledge/ai/frontier/governance/eu-ai-act-risk-tiers-compliance.md
          action: create
          description: >-
            EU AI Act (2024): risk-tier framework (unacceptable, high, limited,
            minimal risk); prohibited applications; high-risk system obligations
            (conformity assessment, transparency, human oversight, logging);
            GPAI model obligations and systemic risk thresholds; enforcement
            via national market surveillance; timeline to full applicability.
            Compliance implications for software teams.
        - path: core/memory/knowledge/ai/frontier/governance/us-ai-policy-executive-orders-nist.md
          action: create
          description: >-
            Biden EO 14110 (Oct 2023): dual-use safety reporting, NIST AI
            Safety Institute mandate, immigration for AI talent, watermarking.
            NIST AI Risk Management Framework (AI RMF 1.0): Govern/Map/Measure/
            Manage functions; profiles and tiers. Voluntary commitments (July
            2023 White House commitments from major labs). Trump administration
            2025 course correction. Federal agency implementation divergence.
        - path: core/memory/knowledge/ai/frontier/governance/global-ai-regulatory-comparison.md
          action: create
          description: >-
            Comparative table: EU (risk-based ex ante), UK (sector-led
            principles), China (algorithm regulations, generative AI rules,
            CAC), Canada (AIDA), OECD AI Principles as baseline. Regulatory
            arbitrage risks; Brussels Effect in AI; the race-to-the-bottom vs
            coordination equilibria. WTO implications for model access as trade.

