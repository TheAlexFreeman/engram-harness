id: ai-governance-policy-research
project: general-knowledge-base
created: '2026-03-26'
origin_session: memory/activity/2026/03/26/chat-003
status: active
sessions_used: 4
budget:
  deadline: '2026-05-31'
  max_sessions: 5
  advisory: true
purpose:
  summary: >-
    Build a governance/ subdomain under ai/frontier/ covering the regulatory
    landscape, technical governance mechanisms, and governance theory — a
    cross-domain gap that bridges the rationalist AI discourse, social science,
    and software engineering domains.
  context: |
    Engram's AI domain is heavily weighted toward capability research (31
    frontier files) but has almost nothing on how AI is governed externally.
    The rationalist-community/ domain covers alignment theory; the social-
    science/collective-action/ domain covers institutional design in the
    abstract; but there is no file that synthesises the 2024-2026 regulatory
    wave (EU AI Act, US EOs, NIST AI RMF, voluntary commitments), the
    technical artefacts that governance relies on (model cards, red-teaming
    standards, evals), or the political economy of why governance takes the
    shape it does.

    This gap is systemically important: Engram is used in professional
    software-engineering and AI-engineering contexts where governance
    awareness is practically required. The plan creates
    core/memory/knowledge/ai/frontier/governance/ with 6–8 files.
  questions:
    - Is the EU AI Act a workable compliance template, or will it be reformed
      before full enforcement?
    - How do voluntary responsible scaling policies (Anthropic ASL, OpenAI
      Preparedness) relate to regulatory frameworks — are they a substitute,
      a preview, or independent?
    - What does the principal-agent framing add to AI governance theory that
      collective action framing alone does not capture?
    - Should governance failures (cases where frameworks clearly didn't work)
      be their own file, or distributed across the regulatory and technical
      governance files?
work:
  phases:
    - id: orientation
      title: Orient to existing governance-adjacent coverage and map the regulatory landscape
      status: completed
      blockers: []
      sources:
        - path: core/memory/knowledge/ai/frontier/foundation-model-governance.md
          type: internal
          intent: >-
            Understand what governance coverage already exists — foundation-model-
            governance.md is the only current file; the new governance/ subdomain
            must extend and complement it without duplicating.
        - path: core/memory/knowledge/rationalist-community/ai-discourse/canonical-ideas/corrigibility-shutdown-problem-value-loading.md
          type: internal
          intent: >-
            Ground the governance files in the alignment theory context already
            established in the rationalist-community/ domain — governance is
            one answer to the corrigibility and value-alignment problems.
        - path: core/memory/knowledge/social-science/collective-action/collective-action-synthesis-ai-governance.md
          type: internal
          intent: >-
            Use the existing collective-action synthesis as the social-science
            underpinning for the governance theory phase — avoid re-explaining
            Ostrom's work in the governance files.
        - path: core/memory/knowledge/rationalist-community/ai-discourse/industry-influence/
          type: internal
          intent: >-
            Survey what the rationalist-community domain already says about
            industry influence on AI governance, to avoid duplicating that
            treatment in the new governance files.
      postconditions:
        - Scope note written to IN/ defining 6–8 target files and their one-paragraph summaries
        - Clear boundary drawn between foundation-model-governance.md and new governance/ files
        - Confirmed target subdirectory (ai/frontier/governance/)
      requires_approval: false
      changes:
        - path: core/memory/working/projects/general-knowledge-base/IN/governance-scope-note.md
          action: create
          description: >-
            Scope note defining governance/ subdomain, target file list with
            one-paragraph scopes, boundary clarification vis-à-vis existing
            foundation-model-governance.md, and cross-domain connection map.

