            retrieval in the existing agentic RAG framework.
        - path: core/memory/knowledge/ai/frontier/retrieval-memory/colpali-visual-document-retrieval.md
          type: internal
          intent: >-
            Connect and contextualize colpali within the broader multimodal
            retrieval landscape now established.
        - path: core/memory/knowledge/ai/frontier-synthesis.md
          type: internal
          intent: >-
