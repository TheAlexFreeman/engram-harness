# Machine-readable bootstrap configuration for programmatic consumers (MCP server,
# validators, setup tooling). core/INIT.md is the human-readable authority for the
# same routing and loading rules — keep both in sync when the contract changes.
version = 1
router = "core/INIT.md"
default_mode = "returning"
adapter_files = ["AGENTS.md", "CLAUDE.md", ".cursorrules"]

# FIATLUX.md is the system's ultimate authority — the philosophical and theological
# foundation from which all operational rules derive. It is never loaded in normal
# sessions. Consult it only when a decision touches foundational principles and no
# operational document resolves the question.
ultimate_authority = "FIATLUX.md"
ultimate_authority_policy = "on_demand_only"

# Optional in deployed worktree mode. When set, points at the host codebase root
# so startup tooling can surface host-repo git state alongside the memory worktree.
# host_repo_root = "C:/path/to/host/repo"

# Optional repo identity string. Set MEMORY_REPO_IDENTITY env var to this value
# in your MCP config. On startup, the server checks that the resolved repo matches
# this identity (by remote URL or directory name). Catches stale worktrees and
# wrong-repo misconfigurations before they corrupt plan state.
repo_identity = "Engram"

# Optional per-connection user identity. Set MEMORY_USER_ID in your MCP config
# when multiple users share one Engram repo. The current implementation expects a
# bare kebab-case slug such as "alex" and threads it into session state,
# ACCESS entries, and recorded session metadata. Leave unset for single-user
# backward compatibility.
# user_id = "alex"

# Optional external-ingestion scan config. Each watch folder is scanned by
# memory_scan_drop_zone and staged into memory/working/projects/{target_project}/IN/
# with source=external-research and trust=low.
# [[watch_folders]]
# path = "C:/path/to/research-inbox"
# target_project = "harness-expansion"
# source_label = "local-research-inbox"
# extensions = [".md", ".txt", ".pdf"]
# recursive = false

[behavioral_directives]
retrieval_discipline = "When asked about prior conversations, decisions, or stored knowledge, query the relevant SUMMARY files, ACCESS.jsonl, or memory_search before answering from loaded context alone. Do not claim to remember something that is not in the loaded or searched files."

[compaction_flush]
trigger = "context_pressure"
threshold_pct = 75
action = "auto_checkpoint"
skill_ref = "core/memory/skills/session-sync/SKILL.md"

[mode_detection]
automation = "scheduled_or_recurring_run"
periodic_review = "explicit_or_scheduled_governance_review"
first_run = "blank_or_template_backed_repo"
full_bootstrap = "fresh_instantiation_on_returning_repo"
returning = "default_existing_repo_session"
warn_on_detached_head = true
warn_on_worktree_branch_drift = true
warn_on_branch_checked_out_elsewhere = true

[modes.first_run]
token_budget = 20000
prefer_summaries = false

[[modes.first_run.steps]]
path = "README.md"
role = "architecture-reference"
required = true
cost = "medium"

[[modes.first_run.steps]]
path = "core/INIT.md"
role = "router"
required = true
cost = "light"

[[modes.first_run.steps]]
path = "core/governance/first-run.md"
role = "first-run-manifest"
required = true
cost = "light"

[modes.returning]
token_budget = 7000
prefer_summaries = true
maintenance_probes = [
  "core/governance/review-queue.md:load_only_when_non_placeholder",
  "ACCESS.jsonl:count_non_empty_lines",
]
on_demand = [
  "core/memory/working/projects/SUMMARY.md",
  "core/memory/knowledge/SUMMARY.md",
  "core/memory/skills/SUMMARY.md",
]

[[modes.returning.steps]]
path = "core/INIT.md"
role = "router"
required = true
cost = "light"

[[modes.returning.steps]]
path = "core/memory/HOME.md"
role = "session-entry-point"
required = false
skip_if = "placeholder_or_empty"
cost = "light"

[[modes.returning.steps]]
path = "core/memory/users/SUMMARY.md"
