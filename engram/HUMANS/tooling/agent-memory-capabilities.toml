version = 1
kind = "agent-memory-capabilities"
mcp_entrypoint = "core/tools/memory_mcp.py"
manifest_role = "Repo-side prototype for governed memory writes, schema-backed authoring help, and capability discovery."
shared_result_type = "MemoryWriteResult"

[contract_versions]
frontmatter = 1
access = 1
mcp = 1
capabilities = 1
preview = 1
resources = 1
prompts = 1
provenance = 1
structured_read = 1

[tool_sets]
read_support = [
  # Self-referential by design: this tool reads the manifest that declares it.
  "memory_get_capabilities",
  "memory_get_tool_profiles",
  "memory_tool_schema",
  "memory_plan_schema",
  "memory_get_policy_state",
  "memory_route_intent",
  "memory_read_file",
  "memory_list_folder",
  "memory_review_unverified",
  # memory_search supports optional `freshness_weight` (0.0–1.0, default 0.0);
  # when > 0 results are re-ranked by combined text-match + temporal-decay score.
  "memory_search",
  "memory_resolve_link",
  "memory_find_references",
  "memory_scan_frontmatter_health",
  "memory_validate_links",
  "memory_reorganize_preview",
  "memory_suggest_structure",
  "memory_check_cross_references",
  "memory_suggest_links",
  "memory_cross_domain_links",
  "memory_link_delta",
  "memory_surface_unlinked",
  "memory_generate_summary",
  "memory_generate_names_index",
  "memory_score_existing_links",
  "memory_score_links_by_access",
  "memory_access_analytics",
  "memory_diff_branch",
  # memory_git_log supports optional `since` (YYYY-MM-DD) and `path_filter`
  # parameters; returned commit entries may include `truncated` when `n`
  # clips matches before the date window is exhausted.
  "memory_git_log",
  "memory_git_health",
  "memory_session_bootstrap",
  "memory_context_home",
  "memory_prepare_unverified_review",
  "memory_prepare_promotion_batch",
  "memory_prepare_periodic_review",
  "memory_check_aggregation_triggers",
  "memory_aggregate_access",
  "memory_run_periodic_review",
  "memory_get_file_provenance",
  "memory_extract_file",
  "memory_check_knowledge_freshness",
  "memory_inspect_commit",
  "memory_diff",
  # memory_audit_trust supports optional `warn_pct` and may return an
  # `approaching` bucket before files enter the 30-day upcoming window.
  "memory_audit_trust",
  "memory_validate",
  "memory_get_maturity_signals",
  "memory_list_plans",
]
raw_fallback = [
  "memory_write",
  "memory_edit",
  "memory_delete",
  "memory_move",
  "memory_update_frontmatter",
  # memory_update_frontmatter_bulk caps batches at 100 files.
  "memory_update_frontmatter_bulk",
  "memory_commit",
]
semantic_extensions = [
  "memory_plan_create",
  "memory_plan_execute",
  "memory_plan_review",
  "memory_plan_verify",
  "memory_plan_briefing",
  "memory_plan_resume",
  # Project scaffolding and questions.md workflows (governed writes).
  "memory_project_create",
  "memory_project_add_questions",
  "memory_project_resolve_question",
  "memory_stage_external",
  "memory_scan_drop_zone",
  "memory_run_eval",
  "memory_eval_report",
  "memory_record_trace",
  "memory_query_traces",
  "memory_query_dialogue",
  "memory_request_approval",
  "memory_resolve_approval",
  "memory_register_tool",
  "memory_get_tool_policy",
  "memory_add_knowledge_file",
  "memory_mark_reviewed",
  "memory_list_pending_reviews",
  "memory_reorganize_path",
  "memory_promote_knowledge_batch",
  "memory_promote_knowledge_subtree",
  "memory_promote_knowledge",
  "memory_update_names_index",
  "memory_demote_knowledge",
  "memory_archive_knowledge",
  "memory_reset_session_state",
  "memory_append_scratchpad",
  "memory_update_skill",
  "memory_skill_manifest_read",
  "memory_skill_manifest_write",
  "memory_skill_route",
  "memory_skill_list",
  "memory_skill_install",
  "memory_skill_add",
  "memory_skill_remove",
  "memory_skill_sync",
  "memory_update_user_trait",
  "memory_run_aggregation",
  "memory_record_chat_summary",
  "memory_record_periodic_review",
  "memory_log_access",
  "memory_log_access_batch",
  "memory_flag_for_review",
  "memory_resolve_review_item",
  "memory_revert_commit",
  "memory_analyze_graph",
  "memory_audit_link_density",
  "memory_prune_redundant_links",
  "memory_prune_weak_links",
  # Semantic search tools (require sentence-transformers optional dep);
  # memory_semantic_search supports optional `freshness_weight`, `helpfulness_weight`,
  # `vector_weight`, and `bm25_weight` for hybrid ranking; `min_trust` filters by
  # trust level.  memory_reindex rebuilds the embedding index (set `force=True` to
  # re-embed everything).
  "memory_semantic_search",
  "memory_reindex",
]
declared_gaps = []

[integration_boundary]
model = "hybrid"
prefer = "repo_local_semantic_mcp"
native_semantic_scope = "generic_only"
manifest_required_for_repo_specific_semantics = true
degradation_order = [
  "repo_local_semantic_mcp",
  "codex_native_preview_and_policy",
  "raw_fallback_or_defer",
]
desktop_owns = [
  "approval_ux",
  "change_class_enforcement",
  "capability_discovery",
  "preview_rendering",
  "result_presentation",
  "fallback_selection",
]
repo_local_mcp_owns = [
  "semantic_execution",
  "repo_specific_invariants",
  "schema_validation",
  "authoritative_mutation",
  "structured_result_state",
]
native_fallback_owns = [
  "generic_preview",
  "raw_tool_orchestration",
  "deferred_action_summary",
]

[capability_discovery]
well_known_paths = ["HUMANS/tooling/agent-memory-capabilities.toml"]
requires_kind = "agent-memory-capabilities"
supported_versions = [1]
requires_mcp_entrypoint = true
minimum_read_tools = [
  "memory_read_file",
  "memory_list_folder",
  "memory_search",
  "memory_validate",
]
minimum_semantic_tools = [
  "memory_plan_create",
  "memory_plan_execute",
  "memory_add_knowledge_file",
]
read_only_runtime_allowed = true
semantic_detection = "manifest_and_minimum_semantic_tools"
read_only_detection = "minimum_read_tools_without_write_tools"
semantic_result = "repo_local_semantic_mcp"
read_only_result = "codex_native_preview_and_policy"
incompatible_result = "raw_fallback_or_defer"

[tool_profile_contract]
version = 1
selection_mode = "host_side_narrowing_only"
dynamic_runtime_switching = false
list_changed_supported = false
default_profile = "guided_write"
profile_argument = "profile"
compatibility_note = "Tool profiles are advisory metadata only; the MCP runtime exports a static tool surface. The effective default is guided_write (Tier 0 + 1); setting MEMORY_ENABLE_RAW_WRITE_TOOLS=1 activates full (Tier 0 + 1 + 2)."

[tool_profiles.full]
label = "Full Surface"
description = "Expose the complete governed surface, including raw fallback tools when the host opts in."
tool_sets = ["read_support", "semantic_extensions", "raw_fallback"]

[tool_profiles.guided_write]
label = "Guided Writes"
description = "Prefer governed read and semantic tools, including schema-backed authoring help, while excluding raw fallback writes from host discovery."
default = true
tool_sets = ["read_support", "semantic_extensions"]

[tool_profiles.read_only]
label = "Read Only"
description = "Limit host discovery to read and reporting tools when writes are unavailable or undesired."
tool_sets = ["read_support"]

[mcp_native_surface]
resources_enabled = true
prompts_enabled = true
resource_listing_api = "FastMCP list_resources/read_resource"
prompt_listing_api = "FastMCP list_prompts/get_prompt"
resource_fallback_tool = "memory_get_capabilities"
prompt_fallback_tool = "memory_get_capabilities"
boundary_note = "Resources expose stable read-mostly state; prompts package recurring workflows; tools remain authoritative for mutations and parameterized reads."

[mcp_native_surface.resources.capability_summary]
uri = "memory://capabilities/summary"
backed_by = "memory_get_capabilities"
when_to_use = "Load the compact capability and profile snapshot without invoking a tool call."

[mcp_native_surface.resources.policy_summary]
uri = "memory://policy/summary"
backed_by = "memory_get_policy_state"
when_to_use = "Inspect stable change-class, fallback, and profile policy boundaries before path-specific compilation."

[mcp_native_surface.resources.active_plans]
uri = "memory://plans/active"
backed_by = "memory_list_plans"
when_to_use = "Load a compact summary of active plans and next actions for navigation."

[mcp_native_surface.prompts.unverified_review]
name = "memory_prepare_unverified_review_prompt"
backed_by = "memory_prepare_unverified_review"
when_to_use = "Guide a host through review of low-trust knowledge before promotion."

[mcp_native_surface.prompts.promotion_preview]
name = "memory_governed_promotion_preview_prompt"
backed_by = "memory_prepare_promotion_batch"
when_to_use = "Structure a governed promotion-preview conversation before applying knowledge promotions."

[mcp_native_surface.prompts.periodic_review]
name = "memory_prepare_periodic_review_prompt"
backed_by = "memory_prepare_periodic_review"
when_to_use = "Guide a protected periodic-review workflow using the compact review bundle."

[provenance_schema]
optional_fields = [
  "origin_commit",
  "produced_by",
  "verified_by",
  "inputs",
  "related_sources",
]
backward_compatible = true
guidance = "These fields are additive lineage hints. Older files remain valid when they are absent."

[structured_read]
tool = "memory_extract_file"
purpose = "Return frontmatter, heading outline, selected sections, and bounded previews without temp-file fallback for common large-file inspection."
supports_markdown_outline = true
supports_selected_headings = true
supports_preview_windows = true

