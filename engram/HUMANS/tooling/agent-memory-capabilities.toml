[shared_result]
fields = [
  "files_changed",
  "commit_sha",
  "commit_message",
  "new_state",
  "warnings",
  "preview",
]
raw_commit_model = "stage_then_memory_commit"
semantic_commit_model = "operation_defined"

[access_logging]
task_ids = ["plan-review", "research-write", "validation", "health-check"]

[change_classes.automatic]
approval = "none"
user_awareness = "not_required"
ui_affordance = "apply_and_report"
read_only_behavior = "defer_and_emit_summary"
notes = "Routine, bounded writes that the repo allows without a separate approval step."

[change_classes.proposed]
approval = "explicit_user_awareness"
user_awareness = "required_before_write"
ui_affordance = "preview_and_wait"
read_only_behavior = "defer_and_queue_review_or_summary"
notes = "Meaningful durable-memory changes that should be surfaced to the user before execution."

[change_classes.protected]
approval = "explicit_user_approval"
user_awareness = "required_before_write"
ui_affordance = "block_until_approved"
read_only_behavior = "defer_and_report_blocked"
notes = "Protected-target writes such as README.md, most governance/ files, and memory/skills/ changes."

[raw_fallback_policy]
policy = "inherit_operation_change_class"
runtime_export = "opt_in"
opt_in_env_var = "MEMORY_ENABLE_RAW_WRITE_TOOLS"
requires_change_class = true
preview_required_for = ["proposed", "protected"]
read_only_mode = "emit_deferred_action_summary"

[fallback_behavior.semantic_gap]
trigger = "no_semantic_tool_exists_for_requested_write"
raw_tools_allowed = true
requires_change_class = true
requires_contract_preservation = true
result = "use_raw_tools_with_preview_or_defer"

[fallback_behavior.uninterpretable_target]
trigger = "semantic_tool_cannot_model_target_file_or_repo_shape"
raw_tools_allowed = false
requires_change_class = true
requires_contract_preservation = true
result = "defer_with_contract_warning"

[fallback_behavior.preview_only]
trigger = "user_requested_preview_or_app_requested_dry_run"
raw_tools_allowed = false
requires_change_class = true
requires_contract_preservation = false
result = "return_preview_without_writing"

[fallback_behavior.read_only]
trigger = "runtime_disallows_writes_for_this_repo_or_thread"
raw_tools_allowed = false
requires_change_class = true
requires_contract_preservation = false
result = "return_deferred_action_summary"

[approval_ux.preview]
required_for = ["proposed", "protected"]
sections = [
  "summary",
  "reasoning",
  "target_files",
  "invariant_effects",
  "commit_suggestion",
  "fallback_behavior",
]
show_resulting_state = true
show_warnings = true

[approval_ux.proposed]
trigger = "before_write"
primary_action = "apply_after_confirmation"
secondary_actions = ["open_files", "defer"]
deferred_outcome = "queue_review_or_summary"
copy_style = "brief_reasoned_summary"

[approval_ux.protected]
trigger = "before_write"
primary_action = "approve_and_apply"
secondary_actions = ["open_files", "defer", "cancel"]
deferred_outcome = "report_blocked"
copy_style = "explicit_protected_warning"

[error_taxonomy.ConflictError]
status = "implemented"
meaning = "Version token mismatch while updating an existing file."
recovery = "Re-read the file, obtain the current version token, and retry."

[error_taxonomy.NotFoundError]
status = "implemented"
meaning = "Referenced file, plan, or section does not exist."
recovery = "Refresh caller state and verify the target path or identifier."

[error_taxonomy.ValidationError]
status = "implemented"
meaning = "Input, frontmatter, or invariant contract is invalid."
recovery = "Fix the request shape or normalize content before retrying."

[error_taxonomy.DuplicateContentError]
status = "implemented"
meaning = "A staged external-content hash already exists for the target project."
recovery = "Treat as already-ingested content or choose a different file after reviewing the existing staged filename."

[error_taxonomy.StagingError]
status = "implemented"
meaning = "git add, mv, rm, or commit failed while sealing the change."
recovery = "Inspect git stderr, correct repo state, and retry."

[error_taxonomy.MemoryPermissionError]
status = "implemented"
meaning = "Operation is blocked by protected-directory or delete-permission rules."
recovery = "Choose a non-protected path or obtain explicit runtime permission."

[error_taxonomy.AlreadyDoneError]
status = "defined_not_currently_emitted"
meaning = "Operation was already in the requested end state."
recovery = "Treat as idempotent no-op and refresh caller state if needed."

