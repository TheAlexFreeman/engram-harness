version = 1
kind = "agent-task-readiness"
resolver_entrypoint = "HUMANS/tooling/scripts/resolve_task_readiness.py"
manifest_role = "Repo-side prototype for task-aware GitHub, network, and local tooling preflight, including zero-check local inspection/schema flows plus guarded terminal write operations."

[task_detection]
default_profile = "workspace_general"
profile_order = [
  "pull_request",
  "publish_branch",
  "terminal_plan_authoring",
  "python_dependency_install",
  "node_dependency_install",
  "python_validation",
  "node_validation",
]

[cache_policy]
result_ttl_sec = 300
retry_failure_ttl_sec = 60
recheck_on_manual_retry = true
recheck_on_final_gate = true
agent_refresh_allowed = true

[execution]
preflight_before_substantial_work = true
surface_changes_since_initial_check = true

[automation_integration]
carry_forward_blockers = true
skip_unchanged_publish_attempts = true
notify_when_restored = true

[ui_feedback]
panel_title = "Task Readiness"
manifest_action_label = "Open Readiness Contract"
manifest_action_reason = "Repo-declared preflight contract for GitHub, network, and local tooling blockers."
details_when_blocked_only = true
green_summary_only = true

[ui_feedback.status_labels]
ready = "Ready to proceed"
attention = "Attention needed"
blocked = "Blocked"
manifest_only = "Manifest loaded"

[profiles.workspace_general]
title = "Workspace General"
description = "Generic local editing, read-only plan/approval/trace inspection, schema-backed CLI help, or investigation with no publish, install, or validation requirement."
keywords = []
checks = []
final_gate_checks = []
fallback_message = "Local work can continue, including read-only approval/trace inspection and schema-backed CLI help."
blocked_reason = "No task-specific preflight gates were requested."
success_message = "No preflight checks are required for local edits, read-only plan/approval/trace inspection, schema-backed help, or general investigation."

[profiles.terminal_plan_authoring]
title = "Terminal Plan Authoring"
description = "Tasks that use local `engram plan create`, `engram plan advance`, or `engram approval resolve` workflows for schema help, preview, or commit-backed plan updates without an MCP host."
keywords = [
  "engram plan create",
  "plan create",
  "plan authoring",
  "author plan",
  "plan yaml",
  "engram plan advance",
  "plan advance",
  "engram approval resolve",
  "approval resolve",
]
checks = ["python_runtime", "git_cli"]
final_gate_checks = ["python_runtime", "git_cli"]
fallback_message = "Schema help, preview, and read-only inspection can continue, but terminal plan creation, advancement, or approval resolution is blocked."
blocked_reason = "Restore the repo Python runtime or Git CLI before retrying terminal plan authoring or approval resolution."
success_message = "Terminal plan authoring and approval-resolution prerequisites are available."

[profiles.pull_request]
title = "Pull Request"
description = "GitHub publishing work that expects git push reachability and gh-based PR creation."
keywords = [
  "pull request",
  "create pr",
  "create a pr",
  "open pr",
  "open a pr",
  "gh pr",
  "github pr",
  "publish pr",
]
checks = [
  "git_cli",
  "git_remote",
  "git_push_dry_run",
  "gh_auth",
  "remote_network",
]
final_gate_checks = [
  "git_remote",
  "git_push_dry_run",
  "gh_auth",
  "remote_network",
]
fallback_message = "Local work complete, publish blocked."
blocked_reason = "Retry after GitHub auth, remote auth, or network access is restored."
success_message = "GitHub publish prerequisites are available."

[profiles.publish_branch]
title = "Publish Branch"
description = "Branch publish work that expects git push reachability but not necessarily gh-based PR creation."
keywords = [
  "git push",
  "push branch",
  "publish branch",
  "publish changes",
  "push commit",
]
checks = ["git_cli", "git_remote", "git_push_dry_run", "remote_network"]
final_gate_checks = ["git_remote", "git_push_dry_run", "remote_network"]
fallback_message = "Local work complete, push blocked."
blocked_reason = "Retry after remote auth or network access is restored."
success_message = "Branch publish prerequisites are available."

[profiles.python_validation]
title = "Python Validation"
description = "Tasks that expect the repo Python runtime plus validation tooling."
keywords = [
  "pytest",
  "ruff",
  "run tests",
  "run validation",
  "lint python",
  "validate repo",
]
checks = ["python_runtime", "python_validation_stack"]
final_gate_checks = ["python_runtime", "python_validation_stack"]
fallback_message = "Validation skipped because the Python runtime or validation tools are missing."
blocked_reason = "Restore the repo Python environment before retrying validation."
success_message = "Python validation tooling is available."

[profiles.python_dependency_install]
title = "Python Dependency Install"
description = "Tasks that need Python package installation and outbound package-network access."
keywords = [
  "pip install",
  "uv sync",
  "install dependency",
  "install package",
  "python dependency",
]
checks = ["python_runtime", "python_package_manager", "python_package_network"]
final_gate_checks = ["python_package_manager", "python_package_network"]
fallback_message = "Dependency install blocked; edit dependency files locally and install later."
blocked_reason = "Restore Python package-manager access or network access before retrying installs."
success_message = "Python package installation prerequisites are available."

[profiles.node_validation]
title = "Node Validation"
description = "Tasks that expect a Node runtime plus basic package-manager tooling."
keywords = [
  "npm test",
  "pnpm test",
  "yarn test",
  "eslint",
  "vite",
  "node validation",
]
checks = ["node_runtime", "node_validation_stack"]
final_gate_checks = ["node_runtime", "node_validation_stack"]
fallback_message = "Validation skipped because the Node runtime or package-manager tooling is missing."
blocked_reason = "Restore the Node runtime or package-manager tooling before retrying validation."
success_message = "Node validation tooling is available."

[profiles.node_dependency_install]
title = "Node Dependency Install"
description = "Tasks that need Node package installation and outbound registry access."
keywords = [
  "npm install",
  "pnpm install",
  "yarn install",
  "node dependency",
  "frontend dependency",
]
checks = ["node_runtime", "node_package_manager", "node_package_network"]
final_gate_checks = ["node_package_manager", "node_package_network"]
fallback_message = "Dependency install blocked; edit package manifests locally and install later."
blocked_reason = "Restore Node package-manager access or registry network access before retrying installs."
success_message = "Node package installation prerequisites are available."

[checks.git_cli]
title = "Git CLI"
category = "tooling"
failure_modes = ["missing", "runtime"]
retry_action = "restore_git"
fallback_paths = ["local_edits_only"]

[checks.git_remote]
title = "Git remote reachability"
category = "connectivity"
failure_modes = ["missing_remote", "config", "auth", "connectivity", "policy"]
retry_action = "retry_remote_probe"
fallback_paths = ["local_commits_only"]

[checks.git_push_dry_run]
title = "Git push dry-run"
category = "github"
failure_modes = ["repo_state", "config", "auth", "connectivity", "policy"]
retry_action = "retry_publish_probe"
fallback_paths = ["publish_later", "local_commits_only"]

[checks.gh_auth]
title = "GitHub CLI auth"
category = "github"
failure_modes = ["missing", "config", "auth", "connectivity", "policy"]
retry_action = "retry_after_login"
fallback_paths = ["direct_git_push", "publish_later"]

[checks.remote_network]
title = "Remote host network"
category = "connectivity"
failure_modes = ["connectivity", "policy"]
retry_action = "retry_network_probe"
fallback_paths = ["local_only", "publish_later"]

[checks.python_runtime]
title = "Python runtime"
category = "runtime"
failure_modes = ["missing", "runtime"]
retry_action = "restore_python"
fallback_paths = ["edit_without_validation"]

[checks.python_validation_stack]
title = "Python validation tooling"
category = "tooling"
failure_modes = ["missing", "runtime"]
retry_action = "restore_python_env"
fallback_paths = ["validation_later", "edit_without_validation"]

[checks.python_package_manager]
title = "Python package manager"
category = "tooling"
failure_modes = ["missing", "runtime"]
retry_action = "restore_python_env"
fallback_paths = ["edit_dependency_files_only", "install_later"]

[checks.python_package_network]
title = "Python package network"
category = "connectivity"
failure_modes = ["connectivity", "policy"]
retry_action = "retry_network_probe"
fallback_paths = ["edit_dependency_files_only", "install_later"]

[checks.node_runtime]
title = "Node runtime"
category = "runtime"
failure_modes = ["missing", "runtime"]
retry_action = "restore_node"
fallback_paths = ["edit_without_validation"]

[checks.node_validation_stack]
title = "Node validation tooling"
category = "tooling"
failure_modes = ["missing", "runtime"]
retry_action = "restore_node_env"
fallback_paths = ["validation_later", "edit_without_validation"]

[checks.node_package_manager]
title = "Node package manager"
category = "tooling"
failure_modes = ["missing", "runtime"]
retry_action = "restore_node_env"
fallback_paths = ["edit_dependency_files_only", "install_later"]

[checks.node_package_network]
title = "Node package network"
category = "connectivity"
failure_modes = ["connectivity", "policy"]
retry_action = "retry_network_probe"
fallback_paths = ["edit_dependency_files_only", "install_later"]
