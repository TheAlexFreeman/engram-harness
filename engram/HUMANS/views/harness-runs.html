<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harness — Runs</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="engram-shared.css">
<style>
/* ── Header ───────────────────────────────────────────── */
.h-header {
  background: var(--dark-bg); color: var(--dark-text);
  padding: var(--space-md) var(--space-lg);
}
.h-header h1 { color: #fff; margin: 0; font-size: 1.5rem; }
.h-header .subtitle { color: var(--dark-text-muted); margin: 4px 0 0; font-size: var(--text-sm); }
.h-header nav { display: flex; gap: 1rem; }
.h-header .nav-link { color: var(--dark-text-muted); font-size: var(--text-sm); text-decoration: none; }
.h-header .nav-link:hover,
.h-header .nav-link.current { color: #fff; }

.h-body { max-width: 1200px; margin: 0 auto; padding: var(--space-lg); }

/* ── Toolbar ──────────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
  margin-bottom: var(--space-md);
}
.btn-primary, .btn-secondary, .btn-small {
  border: none; cursor: pointer; font-family: inherit;
  transition: background 0.15s, transform 0.15s;
}
.btn-primary {
  background: var(--color-btn-primary); color: #fff;
  padding: 0.5rem 1.1rem; border-radius: var(--radius-button);
  font-size: var(--text-base); font-weight: 500;
}
.btn-primary:hover { background: var(--color-btn-primary-hover); }
.btn-primary:active { transform: scale(0.97); }
.btn-small {
  padding: 0.3rem 0.7rem; font-size: var(--text-xs);
  border-radius: var(--radius-small); border: 1px solid var(--color-border);
  background: var(--color-surface); color: var(--color-text);
}
.btn-small:hover { background: var(--color-hover-bg); border-color: var(--color-hover-border); }

.conn-status {
  margin-left: auto; font-size: var(--text-sm); color: var(--color-text-secondary);
}
.conn-status .dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.conn-status .dot.connected    { background: var(--color-ok); }
.conn-status .dot.disconnected { background: var(--color-danger); }

/* ── Stats ────────────────────────────────────────────── */
.stats-bar {
  display: flex; gap: var(--space-md); flex-wrap: wrap;
  margin-bottom: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-card);
}
.stat-item { text-align: center; min-width: 72px; }
.stat-value { font-size: 1.25rem; font-weight: 700; color: var(--color-text); }
.stat-label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: 2px; }

/* ── Status pill ──────────────────────────────────────── */
.status-pill {
  display: inline-block; padding: 1px 8px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
}
@keyframes pulse { 0% { opacity: 1 } 50% { opacity: 0.55 } 100% { opacity: 1 } }
.status-pill.pulse { animation: pulse 1.6s ease-in-out infinite; }

/* ── Runs table ───────────────────────────────────────── */
.runs-table {
  width: 100%; border-collapse: collapse;
  background: var(--color-surface); border: 1px solid var(--color-border-light);
  border-radius: var(--radius-card); overflow: hidden;
  font-size: var(--text-sm);
}
.runs-table th, .runs-table td {
  text-align: left; padding: 0.55rem 0.85rem;
  border-bottom: 1px solid var(--color-border-fine);
  vertical-align: top;
}
.runs-table th {
  background: var(--color-header); color: var(--color-text-secondary);
  font-size: var(--text-xs); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.runs-table tr.row-link { cursor: pointer; transition: background 0.1s; }
.runs-table tr.row-link:hover { background: var(--color-hover-bg); }
.runs-table td.task {
  max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--color-text);
}
.runs-table td.mono {
  font-family: var(--font-mono); font-size: var(--text-xs);
  color: var(--color-text-secondary);
}
.runs-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.runs-table td.err { color: var(--color-danger); font-weight: 500; }

.state-msg {
  text-align: center; padding: 3rem 1rem;
  color: var(--color-text-secondary); font-size: var(--text-sm);
}
.error-banner {
  display: none; padding: 0.6rem 1rem; margin-bottom: var(--space-sm);
  background: rgba(211,95,74,0.12); color: var(--color-danger);
  border: 1px solid rgba(211,95,74,0.4); border-radius: var(--radius-small);
  font-size: var(--text-sm);
}
.error-banner.visible { display: block; }
</style>
</head>
<body>

<header class="h-header">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
    <div>
      <h1>Harness — Runs</h1>
      <p class="subtitle">Agent sessions &mdash; live + historical</p>
    </div>
    <nav>
      <a class="nav-link current" href="harness-runs.html">Runs</a>
      <a class="nav-link" href="harness-launch.html">New run</a>
      <a class="nav-link" href="dashboard.html">Engram dashboard</a>
      <a class="nav-link" href="traces.html">Memory traces</a>
    </nav>
  </div>
</header>

<main class="h-body">

  <div class="toolbar">
    <a class="btn-primary" href="harness-launch.html">+ New run</a>
    <button class="btn-small" id="btn-refresh">Refresh</button>
    <label style="font-size:var(--text-sm);color:var(--color-text-secondary);display:flex;align-items:center;gap:0.3rem;cursor:pointer">
      <input type="checkbox" id="auto-refresh" checked> auto-refresh
    </label>
    <div class="conn-status" id="conn-status"></div>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-running">—</div><div class="stat-label">Running</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-done">—</div><div class="stat-label">Done</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-error">—</div><div class="stat-label">Errors</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-incomplete">—</div><div class="stat-label">Incomplete</div></div>
  </div>

  <div id="main-content">
    <div class="state-msg">Loading runs&hellip;</div>
  </div>

</main>

<script src="engram-utils.js"></script>
<script src="harness-utils.js"></script>
<script>
(function () {
  'use strict';

  var H = window.Harness;
  var POLL_INTERVAL_MS = 3000;
  var pollTimer = null;

  function showError(msg) {
    var banner = document.getElementById('error-banner');
    banner.textContent = msg;
    banner.classList.add('visible');
  }
  function clearError() {
    document.getElementById('error-banner').classList.remove('visible');
  }

  function computeStats(sessions) {
    var s = { total: sessions.length, running: 0, completed: 0, error: 0, stopped: 0, cancelled: 0 };
    for (var i = 0; i < sessions.length; i++) {
      var st = sessions[i].status;
      if (s[st] === undefined) s[st] = 0;
      s[st]++;
    }
    return s;
  }

  function renderStats(s) {
    document.getElementById('stat-total').textContent = s.total;
    document.getElementById('stat-running').textContent = s.running;
    document.getElementById('stat-done').textContent = s.completed;
    document.getElementById('stat-error').textContent = s.error;
    document.getElementById('stat-incomplete').textContent = s.stopped;
  }

  function durationFor(run) {
    if (!run.created_at) return null;
    var t0 = Date.parse(run.created_at);
    if (isNaN(t0)) return null;
    var t1 = run.ended_at ? Date.parse(run.ended_at) : Date.now();
    if (isNaN(t1)) return null;
    return t1 - t0;
  }

  function renderRuns(sessions) {
    var container = document.getElementById('main-content');
    container.innerHTML = '';

    if (!sessions.length) {
      var empty = H.el('div', 'No runs yet. Launch one from the New run page.', 'state-msg');
      container.appendChild(empty);
      return;
    }

    var table = H.el('table', null, 'runs-table');
    var thead = H.el('thead');
    var trh = H.el('tr');
    ['', 'Task', 'Model', 'Mode', 'Started', 'Duration', 'Turns', 'Tools', 'Errors'].forEach(function (t) {
      trh.appendChild(H.el('th', t));
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    var tbody = H.el('tbody');
    sessions.forEach(function (r) {
      var tr = H.el('tr', null, 'row-link');
      tr.setAttribute('data-run-id', r.session_id);
      tr.addEventListener('click', function () {
        window.location.href = 'harness-run.html?id=' + encodeURIComponent(r.session_id);
      });

      // Status
      var tdStatus = H.el('td');
      tdStatus.appendChild(H.statusBadge(r.status));
      tr.appendChild(tdStatus);

      // Task
      var tdTask = H.el('td', r.task || '(no task)', 'task');
      tdTask.title = r.task || '';
      tr.appendChild(tdTask);

      // Model
      tr.appendChild(H.el('td', r.model || '—', 'mono'));

      // Mode
      tr.appendChild(H.el('td', r.mode || '—', 'mono'));

      // Started
      var started = r.created_at ? H.fmtRelative(r.created_at) : '—';
      var tdStarted = H.el('td', started);
      if (r.created_at) tdStarted.title = r.created_at;
      tr.appendChild(tdStarted);

      // Duration
      var dur = durationFor(r);
      tr.appendChild(H.el('td', dur == null ? '—' : H.fmtDuration(dur), 'num'));

      // Turns
      tr.appendChild(H.el('td', String(r.turns_used || 0), 'num'));

      // Tool calls
      tr.appendChild(H.el('td', String(r.tool_count || 0), 'num'));

      // Tool errors
      var errs = r.error_count || 0;
      tr.appendChild(H.el('td', String(errs), 'num' + (errs > 0 ? ' err' : '')));

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  function refresh() {
    H.api('/sessions').then(function (data) {
      clearError();
      H.setConnStatus(document.getElementById('conn-status'), true, 'connected');
      renderStats(computeStats(data.sessions || []));
      renderRuns(data.sessions || []);
    }).catch(function (err) {
      H.setConnStatus(document.getElementById('conn-status'), false, 'server not reachable');
      showError('Failed to load runs: ' + (err.message || err));
    });
  }

  function startPolling() {
    stopPolling();
    pollTimer = setInterval(function () {
      if (document.hidden) return;  // skip polls while tab is hidden
      refresh();
    }, POLL_INTERVAL_MS);
  }
  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  document.getElementById('btn-refresh').addEventListener('click', refresh);
  document.getElementById('auto-refresh').addEventListener('change', function (e) {
    if (e.target.checked) startPolling(); else stopPolling();
  });

  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) refresh();
  });

  refresh();
  startPolling();
})();
</script>
</body>
</html>
